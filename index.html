<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <form id="FormAdocao" action="Formulario">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="text" id="email" name="email" placeholder="Seu melhor Email" required>
        <br><br>
        <label for="Telefone">Numero:</label>
        <input type="text" id="telefone" name="Telefone" placeholder="Seu Numero de Telefone" required>
        <br><br>
        <label for="CPF">CPF:</label>
        <input type="text" id="cpf" name="CPF" placeholder="Seu CPF (Sem ponto e traço)" required>
        <br><br>
        <label for="Idade">Idade:</label>
        <input type="text" id="idade" name="Idade" placeholder="Sua Idade" required>
        <br><br>
        <label for="Cidade">Cidade:</label>
        <input type="text" id="moradia" name="Tipo de moradia" placeholder="Casa ou Apartamento" required>
        <br><br>
        <label for="Quintal">Você tem quintal?</label>
        <select id="Quintal" name="Quintal" required>
            <option value=""></option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>
    </form>
    <script src="script.js"></script>
</body>

</html>
