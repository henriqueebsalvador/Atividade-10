<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <form id="FormAdocao">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required>

        <label for="email">Email:</label>
        <input type="text" id="email" name="email" placeholder="Seu melhor Email" required>

        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" name="telefone" placeholder="Seu Numero de Telefone" required>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Seu CPF (Somente números)" required>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" placeholder="Sua Idade" required>

        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" name="cidade" placeholder="Sua Cidade" required>

        <label for="moradia">Tipo de Moradia:</label>
        <select id="moradia" name="moradia" required>
            <option value=""></option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>

        <label for="permitirAnimais">Se for apartamento, o local permite animais?</label>
        <select id="permitirAnimais" name="permitirAnimais">
            <option value=""></option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>

        <label for="quintal">Você tem quintal?</label>
        <select id="quintal" name="quintal" required>
            <option value=""></option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>

        <label for="quintalSeguro">Se for casa, o quintal é seguro?</label>
        <select id="quintalSeguro" name="quintalSeguro">
            <option value=""></option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>

        <label for="jaTevePets">Já teve PETS?</label>
        <select id="jaTevePets" name="jaTevePets" required>
            <option value=""></option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>

        <label for="espacoExterno">Pretende usar espaço externo?</label>
        <select id="espacoExterno" name="espacoExterno" required>
            <option value=""></option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>

        <label for="horasSozinho">Quantas horas o Pet ficará sozinho?</label>
        <input type="number" id="horasSozinho" name="horasSozinho" placeholder="Horas por dia" required>

        <label for="quandoDecidiu">Quando decidiu adotar?</label>
        <select id="quandoDecidiu" name="quandoDecidiu" required>
            <option value=""></option>
            <option value="hoje">Hoje mesmo</option>
            <option value="faz_tempo">Já venho planejando</option>
        </select>

        <label for="motivo">Motivo da Adoção:</label>
        <input type="text" id="motivo" name="motivo" placeholder="Motivo Da Adoção" required>

        <label for="termos">Aceito os termos de responsabilidade</label>
        <input type="checkbox" id="termos" name="termos" required>

        <button type="submit">Enviar Formulário</button>
    </form>
    <script src="script.js"></script>
</body>

</html>
